user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # DNS Docker (резолв имён при старте, а не только при сборке конфига)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── HTTP редирект на HTTPS (при наличии SSL) ──
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Основной сервер ──
    server {
        listen 80;
        server_name _;

        # ── Task Service (Django SSR + API + Static) ──
        location / {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static файлы (Django) ──
        location /static/ {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Task Service API (Django REST API) ──
        location /api/ {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Task действия (edit, delete, complete, restore) ──
        location ~ ^/task/\d+/(edit|delete|complete|restore)/ {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Media файлы (Django) ──
        location /media/ {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream;
            proxy_set_header Host $host;
            expires 7d;
        }

        # ── AI Service API ──
        location /api/subtasks/generate {
            set $ai_upstream ai-service:8002;
            proxy_pass http://$ai_upstream/api/subtasks/generate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/cache/ {
            set $ai_upstream ai-service:8002;
            proxy_pass http://$ai_upstream/api/cache/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ai-health {
            set $ai_upstream ai-service:8002;
            proxy_pass http://$ai_upstream/health;
            proxy_set_header Host $host;
        }

        # ── Notification Service API ──
        location /api/notifications/ {
            set $notif_upstream notification-service:8003;
            proxy_pass http://$notif_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Notification Service WebSocket ──
        location /ws/ {
            set $notif_upstream notification-service:8003;
            proxy_pass http://$notif_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        location /notification-health {
            set $notif_upstream notification-service:8003;
            proxy_pass http://$notif_upstream/health;
            proxy_set_header Host $host;
        }

        # ── Health checks для сервисов ──
        location /health {
            set $task_upstream task-service:8000;
            proxy_pass http://$task_upstream/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/ai {
            set $ai_upstream ai-service:8002;
            proxy_pass http://$ai_upstream/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/notifications {
            set $notif_upstream notification-service:8003;
            proxy_pass http://$notif_upstream/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── 404 для неизвестных путей ──
        # error_page 404 /404.html;
    }

    # ── SSL (закомментировано, раскомментируйте при наличии сертификатов) ──
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Остальная конфигурация как выше...
    # }
}
