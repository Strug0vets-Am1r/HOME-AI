services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15
    container_name: homeai-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-home_ai_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeai-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: homeai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeai-network

  # ── Task Service (Django REST API + SSR) ──
  task-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeai-task-service
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn home_ai.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-home_ai_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ML_SERVICE_URL: http://ai-service:8002
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_MODEL_URI: ${YANDEX_MODEL_URI:-}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - homeai-network

  # ── Nginx (API Gateway, порт 80) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: homeai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - task-service
      - ai-service
      - notification-service
    networks:
      - homeai-network

  # ── Celery Worker ──
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeai-celery-worker
    command: celery -A home_ai worker -l info -c 4
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-home_ai_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ML_SERVICE_URL: http://ai-service:8002
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - task-service
      - ai-service
    volumes:
      - .:/app
    networks:
      - homeai-network

  # ── Celery Beat ──
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeai-celery-beat
    command: celery -A home_ai beat -l info
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-home_ai_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    networks:
      - homeai-network

  # ── AI Service (FastAPI + YandexGPT) ──
  ai-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: homeai-ai-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_MODEL_URI: ${YANDEX_MODEL_URI:-}
    expose:
      - "8002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - homeai-network

  # ── Suggestion Service (эвристика повторяющихся задач) ──
  suggestion-service:
    build:
      context: ./suggestion_service
      dockerfile: Dockerfile
    container_name: homeai-suggestion-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DJANGO_API_URL: http://task-service:8000
    expose:
      - "8004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - homeai-network

  # ── Notification Service (WebSocket) ──
  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: homeai-notification-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DJANGO_API_URL: http://task-service:8000
    expose:
      - "8003"
    volumes:
      - ./notification_service:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - homeai-network

networks:
  homeai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
