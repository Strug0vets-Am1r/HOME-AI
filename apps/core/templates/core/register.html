{% extends 'core/base.html' %}
{% block extra_css %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}

{% block title %}Регистрация{% endblock %}

{% block topbar %}
<div class="topbar">
    <div style="display: flex; align-items: center; gap: 16px; position: relative;">
        <h1 class="topbar__title" id="topbar-title">Регистрация</h1>
    </div>
    <div class="topbar__actions">
        <a href="{% url 'home' %}" class="topbar__close-btn" title="Закрыть" style="text-decoration: none;">×</a>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="panel panel--glass" style="max-width: 560px; margin: 0 auto;">
    <div class="panel__body">
        <form method="post" class="form-grid">
            {% csrf_token %}

            <div class="field">
                <label class="field__label" for="username">Имя пользователя</label>
                <input type="text" class="input" id="username" name="username" value="{{ post.username|default:'' }}" required>
            </div>

            <div class="reg-row">
                <div class="field">
                    <label class="field__label" for="first_name">Имя</label>
                    <input type="text" class="input" id="first_name" name="first_name" value="{{ post.first_name|default:'' }}">
                </div>
                <div class="field">
                    <label class="field__label" for="last_name">Фамилия</label>
                    <input type="text" class="input" id="last_name" name="last_name" value="{{ post.last_name|default:'' }}">
                </div>
            </div>

            <div class="field">
                <label class="field__label" for="email">Email</label>
                <input type="email" class="input" id="email" name="email" value="{{ post.email|default:'' }}">
            </div>

            <div class="field">
                <label class="field__label" for="gender">Пол</label>
                <div class="profile-select-wrap">
                    <select class="select" id="gender" name="gender">
                        <option value="">Не указан</option>
                        <option value="male" {% if post.gender == 'male' %}selected{% endif %}>Мужской</option>
                        <option value="female" {% if post.gender == 'female' %}selected{% endif %}>Женский</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="field__label" for="password">Пароль</label>
                <input type="password" class="input" id="password" name="password" required>
            </div>

            <div class="field">
                <label class="field__label" for="password2">Подтвердите пароль</label>
                <input type="password" class="input" id="password2" name="password2" required>
            </div>

            <button type="submit" class="button button--success">Зарегистрироваться</button>
        </form>

        <p class="muted" style="margin: 18px 0 0;">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
    </div>
</div>


{% endblock %}
{% block extra_js %}
<script src="{% static 'js/register.js' %}"></script>
{% endblock %}
